        }

    // ================================================================
    //  RENDER FUNCTIONS
    // ================================================================

    function renderVocabCards(containerId, data) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (data.length === 0) {
            container.innerHTML = `<div class="empty-msg">📭 Chưa có từ vựng nào trong mục này.</div>`;
            return;
        }

        let html = '';
        data.forEach(item => {
            const posClass = item.pos === 'noun' ? 'noun' : item.pos === 'verb' ? 'verb' : item.pos === 'adj' ? 'adj' : 'phrase';
            const posLabel = item.pos === 'noun' ? 'Danh từ' : item.pos === 'verb' ? 'Động từ' : item.pos === 'adj' ? 'Tính từ' : 'Cụm từ';

            let wfHtml = '';
            if (item.wordFamily) {
                const parts = item.wordFamily.split('<br>');
                parts.forEach(part => {
                    if (part.trim()) {
                        wfHtml += `<span class="wf-item">${part}</span>`;
                    }
                });
            }

            html += `
                <div class="vocab-card">
                    <div class="word-row">
                        <div class="word">${item.word} <span class="level">${item.level}</span></div>
                        <span class="pos-tag ${posClass}">${posLabel}</span>
                    </div>
                    <div class="ipa">${item.ipa}</div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="example">${item.example}</div>
                    ${item.collocations ? `<div class="collocations">${item.collocations}</div>` : ''}
                    ${item.wordFamily ? `<div class="word-family">${wfHtml}</div>` : ''}
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ================================================================
    //  TAB SWITCHING
    // ================================================================

    // Main tabs
    document.querySelectorAll('.main-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.main;

            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active-main'));
            document.getElementById(target).classList.add('active-main');

            // Khi chuyển tab, active lại sub-tab đầu tiên của tab đó
            const mainContent = document.getElementById(target);
            const firstSubTab = mainContent.querySelector('.sub-tab-btn');
            if (firstSubTab) {
                firstSubTab.click();
            }
        });
    });

    // Sub tabs
    document.querySelectorAll('.sub-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.sub;

            const parentMain = this.closest('.main-tab-content');
            if (!parentMain) return;

            parentMain.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            parentMain.querySelectorAll('.sub-tab-content').forEach(c => c.classList.remove('active-sub'));
            document.getElementById(target).classList.add('active-sub');
        });
    });

    // ================================================================
    //  INITIALIZE ALL GRIDS
    // ================================================================

    function initGrids() {
        renderVocabCards('test1NounGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'noun'));
        renderVocabCards('test1VerbGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'verb'));
        renderVocabCards('test1AdjGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'adj'));
        renderVocabCards('test1PhraseGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'phrase'));

        renderVocabCards('test2NounGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'noun'));
        renderVocabCards('test2VerbGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'verb'));
        renderVocabCards('test2AdjGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'adj'));
    }
