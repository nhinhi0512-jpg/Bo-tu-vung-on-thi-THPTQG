        }

        .container {

            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .home-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 18px;
            border-radius: 40px;
            color: #f1f5f9;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }

        .home-btn:hover {
            background: #3b82f6;
            color: #0f172a;
            border-color: #3b82f6;
            transform: scale(0.97);
        }

        .home-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .header-title {
            color: #f1f5f9;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-title span {
            color: #60a5fa;
        }

        .header-badge {
            background: #3b82f6;
            color: #0f172a;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        /* ===== MAIN TABS ===== */
        .main-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .main-tab-btn {
            padding: 14px 32px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-tab-btn:hover {
            color: #e2e8f0;
            border-color: rgba(59, 130, 246, 0.4);
        }

        .main-tab-btn.active {
            background: #3b82f6;
            color: #0f172a;
            border-color: #3b82f6;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
        }

        .main-tab-btn .badge-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .main-tab-btn.active .badge-count {
            background: rgba(0, 0, 0, 0.15);
        }

        .main-tab-content {
            display: none;
            animation: fadeUp 0.35s ease;
        }

        .main-tab-content.active-main {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== SUB TABS ===== */
        .sub-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sub-tab-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-tab-btn:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.05);
        }

        .sub-tab-btn.active {
            background: #3b82f6;
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        .sub-tab-btn .icon {
            font-size: 1.1rem;
        }

        .sub-tab-content {
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .sub-tab-content.active-sub {
            display: block;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

            .vocab-grid {
                grid-template-columns: 1fr;
            }
            .header {
                border-radius: 28px;
                padding: 12px 16px;

            .main-tab-btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
            .sub-tab-btn {
                padding: 8px 14px;
                font-size: 0.75rem;
            }

            background: white;
            border-radius: 24px;
            padding: 20px 22px 22px;
            box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.25);

            display: flex;

            justify-content: space-between;
            flex-wrap: wrap;

            font-weight: 700;
            color: #475569;

            font-weight: 400;
            margin-top: 2px;

        .vocab-card .meaning {

            font-size: 1rem;
            font-weight: 500;
            margin-top: 8px;
            padding: 8px 14px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .vocab-card .example {
            color: #475569;
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 10px;
            padding: 10px 14px;
            background: #f1f5f9;
            border-radius: 12px;
            border-left: 3px solid #94a3b8;
            line-height: 1.5;
        }

        .vocab-card .example::before {
            content: "📌 ";
            font-style: normal;
        }

        .vocab-card .collocations {
            margin-top: 10px;
            padding: 10px 14px;
            background: #fef3c7;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #92400e;
            line-height: 1.6;
        }

        .vocab-card .collocations::before {
            content: "🔗 Collocations: ";
            font-weight: 700;
        }

        .vocab-card .word-family {
            margin-top: 8px;
            padding: 10px 14px;
            background: #e0f2fe;
            border-radius: 12px;
            font-size: 0.82rem;
            color: #0369a1;
            line-height: 1.7;
        }

        .vocab-card .word-family::before {
            content: "📚 Word family: ";
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .vocab-card .word-family .wf-item {
            display: block;
            padding: 2px 0;
        }

        .vocab-card .word-family .wf-item .wf-word {
            font-weight: 600;
            color: #0c4a6e;
        }

        .vocab-card .word-family .wf-item .wf-example {
            color: #475569;
            font-style: italic;
        }

        .vocab-card .pos-tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pos-tag.verb { background: #d1fae5; color: #059669; }
        .pos-tag.adj { background: #fce7f3; color: #be185d; }
        .pos-tag.phrase { background: #e0e7ff; color: #4338ca; }
        .pos-tag.adv { background: #fef08a; color: #854d0e; }

        .empty-msg {
            color: #94a3b8;
            text-align: center;
            padding: 40px 20px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #334155;
            padding-top: 30px;
        }
    </style>
</head>

    // ================================================================
    //  RENDER FUNCTIONS
    // ================================================================

    function renderVocabCards(containerId, data) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (data.length === 0) {
            container.innerHTML = `<div class="empty-msg">📭 Chưa có từ vựng nào trong mục này.</div>`;
            return;
        }

        let html = '';
        data.forEach(item => {
            const posClass = item.pos === 'noun' ? 'noun' : item.pos === 'verb' ? 'verb' : item.pos === 'adj' ? 'adj' : 'phrase';
            const posLabel = item.pos === 'noun' ? 'Danh từ' : item.pos === 'verb' ? 'Động từ' : item.pos === 'adj' ? 'Tính từ' : 'Cụm từ';

            let wfHtml = '';
            if (item.wordFamily) {
                const parts = item.wordFamily.split('<br>');
                parts.forEach(part => {
                    if (part.trim()) {
                        wfHtml += `<span class="wf-item">${part}</span>`;
                    }
                });
            }

            html += `
                <div class="vocab-card">
                    <div class="word-row">
                        <div class="word">${item.word} <span class="level">${item.level}</span></div>
                        <span class="pos-tag ${posClass}">${posLabel}</span>
                    </div>
                    <div class="ipa">${item.ipa}</div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="example">${item.example}</div>
                    ${item.collocations ? `<div class="collocations">${item.collocations}</div>` : ''}
                    ${item.wordFamily ? `<div class="word-family">${wfHtml}</div>` : ''}
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ================================================================
    //  TAB SWITCHING
    // ================================================================

    // Main tabs
    document.querySelectorAll('.main-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.main;

            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active-main'));
            document.getElementById(target).classList.add('active-main');

            // Khi chuyển tab, active lại sub-tab đầu tiên của tab đó
            const mainContent = document.getElementById(target);
            const firstSubTab = mainContent.querySelector('.sub-tab-btn');
            if (firstSubTab) {
                firstSubTab.click();
            }
        });
    });

    // Sub tabs
    document.querySelectorAll('.sub-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.sub;

            const parentMain = this.closest('.main-tab-content');
            if (!parentMain) return;

            parentMain.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            parentMain.querySelectorAll('.sub-tab-content').forEach(c => c.classList.remove('active-sub'));
            document.getElementById(target).classList.add('active-sub');
        });
    });

    //  INITIALIZE ALL GRIDS

    function initGrids() {
        renderVocabCards('test1NounGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'noun'));
        renderVocabCards('test1VerbGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'verb'));
        renderVocabCards('test1AdjGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'adj'));

        renderVocabCards('test2AdjGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'adj'));
    }
