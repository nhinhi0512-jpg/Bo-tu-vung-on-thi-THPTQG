        }

        .home-btn svg {

        .header-title {

            font-size: 1.1rem;

        }

            color: #fcd34d;
        }

        .header-badge {
            background: #fbbf24;
            color: #0f172a;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        /* ===== MAIN TABS ===== */
        .main-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

            border-radius: 60px;

            color: #94a3b8;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-tab-btn:hover {
            color: #e2e8f0;
            border-color: rgba(251, 191, 36, 0.4);
        }

        .main-tab-btn.active {
            background: #fbbf24;

            border-radius: 40px;
            font-size: 0.7rem;
        }

        .main-tab-btn.active .badge-count {
            background: rgba(0, 0, 0, 0.15);
        }

        .main-tab-content {
            display: none;
            animation: fadeUp 0.35s ease;
        }

        .main-tab-content.active-main {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sub-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 60px;
            backdrop-filter: blur(4px);

            font-size: 0.85rem;

                font-size: 0.85rem;

                font-size: 0.75rem;

            padding: 8px 14px;
            background: #f8fafc;

            font-style: italic;
            margin-top: 10px;
            padding: 10px 14px;
            background: #f1f5f9;
            border-radius: 12px;

            line-height: 1.5;

        .vocab-card .example::before {
            content: "📌 ";

        .vocab-card .collocations {
            margin-top: 10px;
            padding: 10px 14px;
            background: #fef3c7;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #92400e;

            content: "🔗 Collocations: ";

            background: #e0f2fe;
            border-radius: 12px;
            font-size: 0.82rem;
            color: #0369a1;
            line-height: 1.7;
        }

        .vocab-card .word-family::before {
            content: "📚 Word family: ";
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .vocab-card .word-family .wf-item {
            display: block;
            padding: 2px 0;
        }

        .vocab-card .word-family .wf-item .wf-word {
            font-weight: 600;
            color: #0c4a6e;
        }

        .vocab-card .word-family .wf-item .wf-example {
            color: #475569;
            font-style: italic;
        }

            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;

        .pos-tag.adj { background: #fce7f3; color: #be185d; }
        .pos-tag.phrase { background: #e0e7ff; color: #4338ca; }
        .pos-tag.adv { background: #fef08a; color: #854d0e; }

        .empty-msg {
            color: #94a3b8;
            text-align: center;

        }

        .text-center { text-align: center; }

        footer {

            margin-top: 50px;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #334155;
            padding-top: 30px;
        }
    </style>
</head>

    // ================================================================
    //  RENDER FUNCTIONS
    // ================================================================

    function renderVocabCards(containerId, data) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (data.length === 0) {
            container.innerHTML = `<div class="empty-msg">📭 Chưa có từ vựng nào trong mục này.</div>`;
            return;
        }

        let html = '';
        data.forEach(item => {
            const posClass = item.pos === 'noun' ? 'noun' : item.pos === 'verb' ? 'verb' : item.pos === 'adj' ? 'adj' : 'phrase';
            const posLabel = item.pos === 'noun' ? 'Danh từ' : item.pos === 'verb' ? 'Động từ' : item.pos === 'adj' ? 'Tính từ' : 'Cụm từ';

            let wfHtml = '';
            if (item.wordFamily) {
                const parts = item.wordFamily.split('<br>');
                parts.forEach(part => {
                    if (part.trim()) {
                        wfHtml += `<span class="wf-item">${part}</span>`;
                    }
                });
            }

            html += `
                <div class="vocab-card">
                    <div class="word-row">
                        <div class="word">${item.word} <span class="level">${item.level}</span></div>
                        <span class="pos-tag ${posClass}">${posLabel}</span>
                    </div>
                    <div class="ipa">${item.ipa}</div>
                    <div class="meaning">${item.meaning}</div>
                    <div class="example">${item.example}</div>
                    ${item.collocations ? `<div class="collocations">${item.collocations}</div>` : ''}
                    ${item.wordFamily ? `<div class="word-family">${wfHtml}</div>` : ''}
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // ================================================================
    //  TAB SWITCHING
    // ================================================================

    // Main tabs
    document.querySelectorAll('.main-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.main;

            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active-main'));
            document.getElementById(target).classList.add('active-main');

            // Khi chuyển tab, active lại sub-tab đầu tiên của tab đó
            const mainContent = document.getElementById(target);
            const firstSubTab = mainContent.querySelector('.sub-tab-btn');
            if (firstSubTab) {
                firstSubTab.click();
            }
        });
    });

    // Sub tabs
    document.querySelectorAll('.sub-tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const target = this.dataset.sub;

            const parentMain = this.closest('.main-tab-content');
            if (!parentMain) return;

            parentMain.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            parentMain.querySelectorAll('.sub-tab-content').forEach(c => c.classList.remove('active-sub'));
            document.getElementById(target).classList.add('active-sub');
        });
    });

    // ================================================================
    //  INITIALIZE ALL GRIDS
    // ================================================================

    function initGrids() {
        renderVocabCards('test1NounGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'noun'));
        renderVocabCards('test1VerbGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'verb'));
        renderVocabCards('test1AdjGrid', vocabularyData.filter(w => w.test === 'test1' && w.pos === 'adj'));

        renderVocabCards('test2NounGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'noun'));
        renderVocabCards('test2VerbGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'verb'));
        renderVocabCards('test2AdjGrid', vocabularyData.filter(w => w.test === 'test2' && w.pos === 'adj'));
    }

    initGrids();
